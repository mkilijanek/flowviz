name: Docker Compose Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-compose-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-compose-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      COMPOSE_DOCKER_CLI_BUILD: 1
      DOCKER_BUILDKIT: 1

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker Compose images
        run: docker compose build

      - name: Run Docker Compose smoke test
        run: |
          docker compose up -d
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:3001/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Collect Docker Compose logs
        if: always()
        run: |
          docker compose logs > /tmp/flowviz-docker-compose.log || true
          docker compose down -v

      - name: Upload Docker Compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: /tmp/flowviz-docker-compose.log
          if-no-files-found: ignore
